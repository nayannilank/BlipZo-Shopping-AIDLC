name: Destroy Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment stack to destroy'
        required: true
        type: choice
        options:
          - qa
          - prod
      confirm:
        description: 'Type the environment name to confirm destruction'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy BlipzoStack-${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: inputs.confirm == inputs.environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::165030184891:role/cdk-hnb659fds-deploy-role-165030184891-ap-south-1
          aws-region: ap-south-1

      - name: Destroy stack
        run: cd infra/cdk && npx cdk destroy BlipzoStack-${{ inputs.environment }} --force
